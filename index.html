<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/59b162e155.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/main.js" defer></script>
</head>

<body>
    <main class="main">
        <section class="image-section">
            <img class="image" src="./public/img/Login-img.png" alt="Login image">
        </section>
        <section class="container form-section">
            <form id="form" class="form">
                <h1 class="form-title">Login</h1>
                <span id="message" class="message"></span>
                <div class="input-field">
                    <input class="input" type="text" name="username" id="username" autocomplete="username">
                    <label class="label" for="username">Username</label>
                    <i class="fa-solid fa-user icon"></i>
                </div>
                <div class="input-field">
                    <input class="input" type="password" name="password" id="password" autocomplete="current-password">
                    <label class="label" for="password">Password</label>
                    <i class="fa-solid fa-lock icon"></i>
                </div>
                <div class="input-options">
                    <label for="RememberMe" class="checkbox">
                        <input type="checkbox" name="RememberMe" id="RememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-password link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">
                    Login
                </button>
            </form>
            <div class="login-with">
                <div class="text">
                    <div class="horizontal-line"></div>
                    <span>Or login with</span>
                </div>
                <div class="google-login">
                    <a href="#" class="google-link">
                        <i class="fa-brands fa-google"></i>
                        Login with Google
                    </a>
                </div>
            </div>
            <span class="register">Do you have already an account? <a href="#" class="link">Register</a></span>
        </section>
    </main>
    <div class="modal modal--active">
        <div class="modal-content">
            <div class="modal-icon">✔</div>
            <span class="success">Allowed access</span>
        </div>
    </div>
</body>

</html>
